<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SiteCheck">
<meta name="theme-color" content="#0f172a">
<title>SiteCheck – Vérificateur de sites</title>
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --muted: #94a3b8; --border: rgba(148,163,184,0.15);
    --accent: #38bdf8; --accent-dim: rgba(56,189,248,0.10);
    --green: #4ade80; --green-dim: rgba(74,222,128,0.10);
    --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.10);
    --red: #f87171; --red-dim: rgba(248,113,113,0.10);
    --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
    --r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100%; }

  .header { padding: calc(var(--safe-top) + 14px) 18px 14px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .app-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #0369a1, #38bdf8); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .app-title span { color: var(--accent); }
  .app-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .url-zone { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--r); overflow: hidden; transition: border-color .2s; }
  .url-zone.active { border-color: var(--accent); }
  .url-top { display: flex; align-items: center; padding: 10px 14px; gap: 8px; }
  .url-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .url-input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'SF Mono', monospace; min-width: 0; }
  .url-input::placeholder { color: var(--muted); font-family: -apple-system, sans-serif; font-size: 13px; }
  .url-clear { background: var(--bg3); border: none; border-radius: 50%; width: 20px; height: 20px; color: var(--muted); font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
  .url-actions { display: none; border-top: 1px solid var(--border); padding: 10px 14px; gap: 8px; }
  .url-actions.show { display: flex; }
  .btn-analyse { flex: 1; background: var(--accent); border: none; border-radius: 10px; padding: 11px; color: #0c1a2e; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-analyse:active { opacity: 0.85; }
  .btn-reset { background: var(--bg3); border: none; border-radius: 10px; padding: 11px 16px; color: var(--muted); font-size: 14px; cursor: pointer; }

  .banner { display: none; margin-top: 10px; border-radius: 10px; padding: 10px 13px; font-size: 12px; font-weight: 500; align-items: flex-start; gap: 7px; line-height: 1.5; }
  .banner.show { display: flex; }
  .banner.info { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); }
  .banner.warn { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

  .tabs { display: flex; gap: 6px; padding: 10px 18px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { white-space: nowrap; padding: 6px 14px; border-radius: 99px; font-size: 13px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .content { flex: 1; overflow-y: auto; padding: 0 16px; padding-bottom: calc(var(--safe-bot) + 24px); -webkit-overflow-scrolling: touch; }
  .section { margin-top: 18px; }
  .sec-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 13px 11px; margin-bottom: 9px; }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
  .card-icon { width: 33px; height: 33px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 600; }
  .card-host { font-size: 11px; color: var(--muted); font-family: 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.45; margin-bottom: 9px; }
  .url-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.18); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-family: 'SF Mono', monospace; color: var(--accent); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 7px; }
  .card-foot { display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; }
  .bg { background: var(--green-dim); color: var(--green); }
  .bb { background: var(--accent-dim); color: var(--accent); }
  .ba { background: var(--amber-dim); color: var(--amber); }
  .sp { flex: 1; }
  .btn { border: none; border-radius: 8px; padding: 7px 13px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: #0c1a2e; }
  .btn-secondary { background: var(--bg3); color: var(--text); }

  .tips-card { background: var(--amber-dim); border: 1px solid rgba(251,191,36,0.2); border-radius: var(--r); padding: 13px; margin-top: 18px; margin-bottom: 4px; }
  .tips-head { font-size: 12px; font-weight: 600; color: var(--amber); margin-bottom: 9px; }
  .tip { font-size: 12px; color: #fde68a; display: flex; gap: 7px; margin-bottom: 5px; line-height: 1.4; }
  .tip:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-row">
      <div class="app-icon">🔍</div>
      <div>
        <div class="app-title">Site<span>Check</span></div>
        <div class="app-sub">Vérificateur de sites suspects</div>
      </div>
    </div>
    <div class="url-zone" id="zone">
      <div class="url-top">
        <span class="url-label">URL</span>
        <input class="url-input" id="inp" type="url" inputmode="url"
          placeholder="Coller l'adresse suspecte…"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="onInput()">
        <button class="url-clear" id="clr" onclick="reset()">✕</button>
      </div>
      <div class="url-actions" id="actions">
        <button class="btn-analyse" onclick="analyse()">🔎 Analyser ce site</button>
        <button class="btn-reset" onclick="reset()">Effacer</button>
      </div>
    </div>
    <div class="banner" id="banner">
      <span id="bico"></span><span id="btxt"></span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">Tous</button>
    <button class="tab" onclick="setTab('reputation',this)">Réputation</button>
    <button class="tab" onclick="setTab('virus',this)">Antivirus</button>
    <button class="tab" onclick="setTab('domaine',this)">Domaine</button>
    <button class="tab" onclick="setTab('officiel',this)">Officiel</button>
  </div>

  <div class="content" id="content"></div>
</div>
<script>
const D = [
  { id:"reputation", label:"Réputation & signalements", items:[
    { name:"Google Safe Browsing", host:"transparencyreport.google.com",
      site:"https://transparencyreport.google.com/safe-browsing/search",
      build:u=>`https://transparencyreport.google.com/safe-browsing/search?url=${enc(u)}&hl=fr`,
      desc:"Référence mondiale utilisée par Chrome, Safari et Firefox. Résultat immédiat.",
      icon:"🛡️", bg:"#1a3050", badge:"Gratuit", bc:"bg" },
    { name:"URLVoid", host:"urlvoid.com",
      site:"https://www.urlvoid.com",
      build:u=>`https://www.urlvoid.com/scan/${dom(u)}/`,
      desc:"Agrège 10+ bases de réputation. Score global en un clic.",
      icon:"📊", bg:"#1a3050", badge:"Gratuit", bc:"bg" },
    { name:"Scamdoc", host:"scamdoc.com",
      site:"https://www.scamdoc.com",
      build:u=>`https://www.scamdoc.com/view?url=${enc(dom(u))}`,
      desc:"Spécialisé arnaques. Score de 0 à 100 avec détail des indices suspects.",
      icon:"🚨", bg:"#3a1a1a", badge:"Gratuit", bc:"bg" },
    { name:"Web of Trust (WOT)", host:"mywot.com",
      site:"https://www.mywot.com",
      build:u=>`https://www.mywot.com/scorecard/${dom(u)}`,
      desc:"Réputation communautaire : sécurité, fiabilité, confidentialité.",
      icon:"🌐", bg:"#1a3050", badge:"Gratuit", bc:"bg" }
  ]},
  { id:"virus", label:"Analyse antivirus & malwares", items:[
    { name:"VirusTotal", host:"virustotal.com",
      site:"https://www.virustotal.com",
      build:u=>`https://www.virustotal.com/gui/url/${btoa(u).replace(/=+$/,'')}/detection`,
      desc:"70+ moteurs antivirus simultanément. La référence technique absolue.",
      icon:"🦠", bg:"#1a3a1a", badge:"Gratuit", bc:"bg" },
    { name:"Sucuri SiteCheck", host:"sitecheck.sucuri.net",
      site:"https://sitecheck.sucuri.net",
      build:u=>`https://sitecheck.sucuri.net/results/${dom(u)}`,
      desc:"Malwares, listes noires, failles. Idéal pour vérifier un site e-commerce.",
      icon:"🔬", bg:"#1a3a1a", badge:"Gratuit", bc:"bg" },
    { name:"Hybrid Analysis", host:"hybrid-analysis.com",
      site:"https://www.hybrid-analysis.com",
      build:u=>`https://www.hybrid-analysis.com/search?query=${enc(u)}`,
      desc:"Sandbox comportemental : observe ce que le site exécute réellement.",
      icon:"⚗️", bg:"#1a3a1a", badge:"Gratuit", bc:"bg" }
  ]},
  { id:"domaine", label:"Informations sur le domaine", items:[
    { name:"Whois DomainTools", host:"whois.domaintools.com",
      site:"https://whois.domaintools.com",
      build:u=>`https://whois.domaintools.com/${dom(u)}`,
      desc:"Propriétaire, date de création, registrar. Domaine récent = suspect.",
      icon:"🗂️", bg:"#2d2a1a", badge:"Gratuit", bc:"bg" },
    { name:"Wayback Machine", host:"web.archive.org",
      site:"https://web.archive.org",
      build:u=>`https://web.archive.org/web/*/${u}`,
      desc:"Historique du site. Pas d'archives = apparu très récemment.",
      icon:"🕰️", bg:"#2d2a1a", badge:"Gratuit", bc:"bg" },
    { name:"MXToolbox", host:"mxtoolbox.com",
      site:"https://mxtoolbox.com",
      build:u=>`https://mxtoolbox.com/SuperTool.aspx?action=dns%3a${dom(u)}&run=toolpage`,
      desc:"DNS, serveurs mail, listes noires. Vérifie l'infrastructure technique.",
      icon:"📡", bg:"#2d2a1a", badge:"Gratuit", bc:"bg" }
  ]},
  { id:"officiel", label:"Ressources officielles", items:[
    { name:"Cybermalveillance.gouv.fr", host:"cybermalveillance.gouv.fr",
      site:"https://www.cybermalveillance.gouv.fr",
      build:null,
      desc:"Portail gouvernemental français. Aide aux victimes, diagnostic officiel.",
      icon:"🇫🇷", bg:"#1a1a3a", badge:"Officiel", bc:"bb" },
    { name:"Phishing Initiative", host:"phishing-initiative.fr",
      site:"https://phishing-initiative.fr",
      build:u=>`https://phishing-initiative.fr/contrib/?url=${enc(u)}`,
      desc:"Base française de phishing. Signaler ou vérifier une URL suspecte.",
      icon:"🎣", bg:"#1a1a3a", badge:"France", bc:"bb" },
    { name:"NCSC Suisse", host:"ncsc.admin.ch",
      site:"https://www.ncsc.admin.ch/ncsc/fr/home/melden.html",
      build:null,
      desc:"Centre national suisse. Signalement d'incidents, alertes officielles.",
      icon:"🇨🇭", bg:"#3a1a1a", badge:"Suisse", bc:"ba" },
    { name:"Liste noire AMF/ACPR", host:"acpr.banque-france.fr",
      site:"https://www.acpr.banque-france.fr/verifier-un-site",
      build:null,
      desc:"Sites financiers non autorisés en France. Escrocs et faux placements.",
      icon:"🏛️", bg:"#1a1a3a", badge:"Officiel", bc:"bb" }
  ]}
];

const TIPS = [
  "HTTPS absent ou certificat invalide",
  "Domaine créé il y a moins de 6 mois",
  "Nom bizarre : amaz0n-promo.xyz",
  "Aucunes mentions légales visibles",
  "Prix trop beaux pour être vrais",
  "Adresse ou téléphone introuvable"
];

let tab = 'all', checked = '';

function enc(s){ return encodeURIComponent(s); }
function dom(url){
  try {
    let u = url; if(!/^https?:\/\//i.test(u)) u='https://'+u;
    return new URL(u).hostname.replace(/^www\./,'');
  } catch(e){ return url; }
}
function norm(s){
  let u=s.trim(); if(u && !/^https?:\/\//i.test(u)) u='https://'+u; return u;
}
function isUrl(s){ return s.length>3 && (s.includes('.')||s.startsWith('http')); }

function flags(url){
  const f=[], d=dom(url);
  if(/\d/.test(d.split('.')[0])) f.push("chiffres dans le domaine");
  if(d.split('.').length>3) f.push("sous-domaines multiples");
  const tld=d.split('.').pop();
  if(['xyz','top','club','online','site','click','tk','ml','ga','cf'].includes(tld)) f.push(`.${tld} extension suspecte`);
  if(d.split('-').length>2) f.push("nombreux tirets");
  const brands=['paypal','amazon','apple','google','netflix','microsoft','banque','credit','impot'];
  const hit=brands.find(b=>d.includes(b)&&!d.match(new RegExp(b+'\.(com|fr|ch)$')));
  if(hit) f.push(`imite « ${hit} »`);
  return f;
}

function onInput(){
  const v=document.getElementById('inp').value;
  document.getElementById('clr').style.display=v?'flex':'none';
  document.getElementById('actions').classList.toggle('show', isUrl(v));
  document.getElementById('zone').classList.toggle('active', isUrl(v));
  if(!v){ checked=''; hideBanner(); render(); }
}

function analyse(){
  const raw=document.getElementById('inp').value.trim();
  if(!raw) return;
  checked=norm(raw);
  const f=flags(checked);
  const b=document.getElementById('banner');
  if(f.length){
    b.className='banner show warn';
    document.getElementById('bico').textContent='⚠️ ';
    document.getElementById('btxt').textContent='Indices suspects détectés : '+f.join(', ')+'. Vérifiez avec les outils ci-dessous.';
  } else {
    b.className='banner show info';
    document.getElementById('bico').textContent='ℹ️ ';
    document.getElementById('btxt').textContent='Aucun indice automatique. Vérifiez manuellement avec les outils ci-dessous.';
  }
  render();
  document.getElementById('content').scrollTop=0;
}

function reset(){
  document.getElementById('inp').value='';
  document.getElementById('clr').style.display='none';
  document.getElementById('actions').classList.remove('show');
  document.getElementById('zone').classList.remove('active');
  hideBanner(); checked=''; render();
}

function hideBanner(){ document.getElementById('banner').className='banner'; }

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function go(url){ window.open(url,'_blank'); }

function render(){
  let h='';
  for(const s of D){
    if(tab!=='all' && tab!==s.id) continue;
    h+=`<div class="section"><div class="sec-label">${s.label}</div>`;
    for(const t of s.items){
      const burl = checked && t.build ? t.build(checked) : null;
      h+=`<div class="card">
        <div class="card-top">
          <div class="card-icon" style="background:${t.bg}">${t.icon}</div>
          <div class="card-meta">
            <div class="card-name">${t.name}</div>
            <div class="card-host">${t.host}</div>
          </div>
        </div>
        ${checked ? `<div class="url-chip">🔗 ${dom(checked)}</div>` : ''}
        <div class="card-desc">${t.desc}</div>
        <div class="card-foot">
          <span class="badge ${t.bc}">${t.badge}</span>
          <span class="sp"></span>
          ${burl
            ? `<button class="btn btn-primary" onclick="go('${burl.replace(/'/g,"\\'")}')">Analyser ↗</button>`
            : `<button class="btn btn-secondary" onclick="go('${t.site}')">Ouvrir ↗</button>`
          }
        </div>
      </div>`;
    }
    h+=`</div>`;
  }
  if(!checked){
    h+=`<div class="tips-card">
      <div class="tips-head">⚠️ Signaux d'alarme à repérer</div>
      ${TIPS.map(t=>`<div class="tip"><span>•</span><span>${t}</span></div>`).join('')}
    </div>`;
  }
  document.getElementById('content').innerHTML=h;
}

render();
</script>
</body>
</html>
